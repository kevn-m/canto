name: Canto
options:
  bundleIdPrefix: com.kevinmok.cantoapp
  deploymentTarget:
    iOS: "17.0"

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: 7.0.0

targets:
  Canto:
    type: application
    platform: iOS
    sources:
      - path: Canto
        excludes:
          # secrets.json is copied by the post-build script only if present;
          # a project-file reference would fail a keyless build (see below).
          - "Resources/secrets.json"
    resources:
      - path: Canto/Resources/dict.sqlite
      - path: Canto/Resources/Sprites
      - path: Canto/Resources/SFX
    dependencies:
      - package: GRDB
        product: GRDB
    postBuildScripts:
      - name: Bundle secrets.json if present
        # Copies the gitignored, optional Google Translate key into the app
        # only when it exists, so a keyless checkout still builds. A hard
        # resource reference would fail the build when the file is absent
        # (and force an environment-specific pbxproj). Runs before the
        # implicit code-sign, so the injected file gets signed.
        script: |
          SRC="${SRCROOT}/Canto/Resources/secrets.json"
          if [ -f "${SRC}" ]; then
            cp "${SRC}" "${CODESIGNING_FOLDER_PATH}/secrets.json"
            echo "note: bundled secrets.json (Pick enabled)"
          else
            echo "note: no secrets.json — Pick disabled (offline build)"
          fi
        basedOnDependencyAnalysis: false
    info:
      path: Canto/Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        ITSAppUsesNonExemptEncryption: false
        NSMicrophoneUsageDescription: "Canto listens so you can say the English word you want in Cantonese."
        NSSpeechRecognitionUsageDescription: "Speech recognition turns what you say into the word to look up. Recognition runs on this iPhone only."
        NSCameraUsageDescription: "Take a photo of the thing you just looked up, for its flashcard."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kevinmok.cantoapp
        SWIFT_VERSION: 5.0
        TARGETED_DEVICE_FAMILY: "1"
        DEVELOPMENT_TEAM: 56NFU58N9Q
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: "1"

  CantoTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CantoTests
    dependencies:
      - target: Canto
    settings:
      base:
        SWIFT_VERSION: 5.0
        PRODUCT_BUNDLE_IDENTIFIER: com.kevinmok.cantoapp.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Canto.app/Canto"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  Canto:
    build:
      targets:
        Canto: all
        CantoTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - CantoTests
